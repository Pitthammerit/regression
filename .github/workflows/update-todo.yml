name: Update TODO.md

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/config/**'
      - 'CLAUDE.md'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-todo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Update TODO.md
        id: update-todo
        continue-on-error: true
        run: |
          node scripts/update-todo.js
          # Check if TODO.md was modified
          if git diff --name-only | grep -q "TODO.md"; then
            echo "todo_changed=true" >> $GITHUB_OUTPUT
          else
            echo "todo_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated TODO.md
        if: steps.update-todo.outputs.todo_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TODO.md
          git commit -m "chore: sync TODO.md after main push"
          git push
