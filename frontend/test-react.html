<!DOCTYPE html>
<html>
<head>
  <title>React Test</title>
</head>
<body>
  <div id="root">Loading...</div>
  <script type="module">
    import React from 'http://localhost:3001/node_modules/.vite/deps/react.js';
    import ReactDOM from 'http://localhost:3001/node_modules/.vite/deps/react-dom_client.js';

    const root = document.getElementById('root');
    ReactDOM.createRoot(root).render(
      React.createElement('div', { style: { padding: '20px', background: 'lightgreen' } },
        React.createElement('h1', null, 'React Works!')
      )
    );
  </script>
</body>
</html>
