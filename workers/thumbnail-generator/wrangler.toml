# Cloudflare Worker Configuration
# Thumbnail Generator API
#
# Usage:
#   wrangler dev          # Local development
#   wrangler deploy       # Deploy to Cloudflare
#   wrangler secret put R2_BUCKET # Set R2 bucket name

name = "thumbnail-generator"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# R2 Bucket Binding (set via secret: R2_BUCKET)
[[r2_buckets]]
binding = "VIDEO_BUCKET"
bucket_name = "regression-videos"  # ← Update this to your actual bucket name

# Environment variables
[vars]
# Thumbnail specifications
THUMBNAIL_WIDTH = 1280
THUMBNAIL_HEIGHT = 720
THUMBNAIL_FORMAT = "jpeg"
THUMBNAIL_QUALITY = 60
FRAME_TIME = 1.0  # Extract frame at 1 second

# API Routes
[routes]
pattern = "api/regression-a2m.pages.dev/generate-thumbnail"
zone_name = "regression-a2m.pages.dev"

# Worker schedule (optional: for cleanup tasks)
# [triggers]
# crons = ["0 0 * * *"]  # Daily at midnight
